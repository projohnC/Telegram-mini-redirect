    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedToken = urlParams.get('token');
        const countdownEl = document.getElementById('countdown');
        const verifyBtn = document.getElementById('verifyBtn');
        const statusText = document.getElementById('statusText');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function copyLink(link) {
            try { if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(link); return true; } } catch (err) {}
            return false;
        }

        let verifyLink = null;
        let isLinkValid = false;
        if (encodedToken) {
            try {
                verifyLink = atob(encodedToken.replace(/-/g, '+').replace(/_/g, '/'));
                if (verifyLink && (verifyLink.startsWith('http://') || verifyLink.startsWith('https://') || verifyLink.startsWith('t.me/'))) isLinkValid = true;
            } catch (e) {}
        }
        const finalLink = isLinkValid ? verifyLink : "https://t.me/Sujan_BotZ";

        const executeRedirect = async () => {
            const copied = await copyLink(finalLink);
            if (copied) showToast('✅ Link Copied! Redirecting...');
            setTimeout(() => {
                if (window.Telegram && window.Telegram.WebApp && finalLink.includes('t.me/')) window.Telegram.WebApp.openTelegramLink(finalLink);
                else window.location.href = finalLink;
                statusText.innerText = 'Redirecting...';
                setTimeout(() => { if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close(); }, 2000);
            }, 800);
        };

        const startVerificationCountdown = () => {
            let seconds = 10;
            const interval = setInterval(() => {
                seconds--;
                verifyBtn.innerText = `Please Wait ${seconds}s`;
                statusText.innerText = `Verifying... ${seconds}s`;
                if (seconds <= 0) {
                    clearInterval(interval);
                    executeRedirect();
                }
            }, 1000);
        };

        verifyBtn.addEventListener('click', async function() {
            verifyBtn.disabled = true;
            verifyBtn.innerText = 'Loading Ad...';
            statusText.innerText = 'Preparing...';
            
            try {
                await show_9913319('pop');
            } catch (e) {
                console.error("Ad error:", e);
            }
            startVerificationCountdown();
        });

        const countdownDuration = 5000;
        const targetTime = Date.now() + countdownDuration;
        const timerInterval = setInterval(() => {
            const timeLeft = Math.max(0, Math.ceil((targetTime - Date.now()) / 1000));
            countdownEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                verifyBtn.disabled = false;
                verifyBtn.innerText = 'Get File';
                statusText.innerText = 'File Ready!';
            }
        }, 100);

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
